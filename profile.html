<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Mening Profilim - TimeRead AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="navbar shadow-sm bg-white">
        <div class="container-custom">
            <span class="logo">TimeRead AI</span>
            <button onclick="logout()" class="text-red-500 font-bold border border-red-200 px-4 py-1 rounded-lg hover:bg-red-50">Chiqish</button>
        </div>
    </nav>

    <main class="py-32">
        <div class="max-w-2xl mx-auto bg-white p-12 rounded-3xl shadow-sm text-center">
            <div id="avatar" class="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-4xl font-bold mx-auto mb-6">U</div>
            <h1 class="text-3xl font-bold">Xush kelibsiz, <span id="userName">Foydalanuvchi</span>!</h1>
            <p class="text-gray-500 mt-4">Siz muvaffaqiyatli tizimga kirdingiz. Endi kutubxonadan foydalanishingiz mumkin.</p>
            
            <div class="mt-10 grid grid-cols-2 gap-4">
                <div class="p-6 bg-indigo-50 rounded-2xl">
                    <h3 class="font-bold text-indigo-600 text-2xl">0</h3>
                    <p class="text-sm text-gray-600">O'qilgan kitoblar</p>
                </div>
                <div class="p-6 bg-green-50 rounded-2xl">
                    <h3 class="font-bold text-green-600 text-2xl">0 min</h3>
                    <p class="text-sm text-gray-600">Mutolaa vaqti</p>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
