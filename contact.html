<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Aloqa - TimeRead AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container-custom">
            <a href="index.html" class="logo">TimeRead AI</a>
            <ul class="nav-links">
                <li><a href="index.html">Asosiy</a></li>
                <li><a href="about.html">Haqida</a></li>
                <li><a href="contact.html" class="active">Aloqa</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero-contact">
        <div class="contact-card">
            <h2 class="form-title">Biz bilan bog'laning</h2>
            <p class="form-subtitle">Fikringiz biz uchun muhim!</p>

            <form id="contactForm">
                <input type="text" id="name" placeholder="Ismingiz" class="input-field" required>
                
                <select id="subject" class="input-field">
                    <option value="taklif">Yaxshi tomonlari (Takliflar)</option>
                    <option value="shikoyat">Shikoyatlar</option>
                    <option value="savol" selected>Umumiy savol</option>
                </select>

                <textarea id="message" placeholder="Xabaringizni batafsil yozing..." class="input-field h-32"></textarea>
                
                <button type="button" onclick="sendMessage()" class="btn-submit">Yuborish</button>
            </form>
            
            <div id="successMsg" class="hidden text-green-600 text-center mt-4 font-bold">
                Xabaringiz qabul qilindi. Rahmat!
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
